<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResilientCare.ai</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script> </head>
<body>
    <div class="landing-page">
        <h1>ResilientCare</h1>
        <p>Your compassionate AI companion.</p>

        <div class="vent-container">
            <svg class="progress-ring" width="220" height="220">
                <circle class="progress-ring__circle" stroke="#4a90e2" stroke-width="8" fill="transparent" r="95" cx="110" cy="110"/>
            </svg>
            <a href="#Vent" class="btn-vent">
                <b>Hold to Vent</b>
                <p>Let it all out</p>
            </a>
        </div> <div class="dropdown-wrapper">
            <button class="dropdown-btn" onclick="toggleDropdown()">
                <h2>Select a Mode:</h2>
                <span class="arrow">▼</span>
            </button>

            <div id="modeDropdown" class="mode-menu">
                <div class="mode-card active">
                    <div class="icon-box heart">💙</div>
                    <div class="mode-text">
                        <strong>Empathetic</strong>
                        <p>Warm and validating</p>
                    </div>
                </div>

                <div class="mode-card">
                    <div class="icon-box lightning">⚡</div>
                    <div class="mode-text">
                        <strong>Direct</strong>
                        <p>Action-oriented</p>
                    </div>
                </div>

                <div class="mode-card">
                    <div class="icon-box scale">⚖️</div>
                    <div class="mode-text">
                        <strong>Balanced</strong>
                        <p>Blend of both</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-row">
            <a href="#Insights" class="btn-insights">View Insights</a>
            <a href="#History" class="btn-history">View History</a>
            <a href="#Settings" class="btn-settings">View Settings</a>
        </div>
    </div>
</body>
</html>
