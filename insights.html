<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights Page - ResilientCare</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js" defer></script>
    <script src="https://d3js.org/d3.v7.min.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body onload="loadInsightsGraph()">
    
    <div class="app-single-column">
        
        <nav class="vent-nav">
            <div class="nav-left">
                <button class="icon-btn" onclick="window.location.href='index.html'">← Home</button>
            </div>
            <span class="nav-title">Insights</span>
            <div class="nav-right" style="min-width: 80px;">
                <button class="btn-clear" onclick="clearGraphData()">Clear Data</button>
            </div> 
        </nav>

        <div class="insights-container">
    
    <div class="graph-area" style="position: relative; overflow: hidden; height: 80%;">
        
        <div id="d3-graph-container" style="width: 100%; height: 100%; cursor: grab;"></div>
        
        <div class="zoom-controls">
            <button id="zoom-in" class="zoom-btn" title="Zoom In">+</button>
            <button id="zoom-out" class="zoom-btn" title="Zoom Out">−</button>
            <button id="zoom-reset" class="zoom-btn" title="Reset View" style="margin-top: 5px; font-size: 16px;">⟲</button>
        </div>

    </div>
<!--KEY THEMES/SESSION COMPLETED BOXES-->
            <div class="insights-bottom-panels" style="display: flex; gap: 15px; flex-wrap: wrap;">
                
                <div class="panel key-themes" style="flex: 1; min-width: 150px;">
                    <h3>KEY THEMES</h3>
                    <div class="theme-tags" id="theme-tags"></div>
                </div>
                
                <div class="panel sessions-stats" style="flex: 1; min-width: 150px;">
                    <div class="stats-text">
                        <p style="margin:0; font-weight:600; color: var(--text-main);">Sessions Completed</p>
                        <p style="margin: 5px 0 0 0; font-size: 11px; color: var(--text-muted);">Click a node to see session details</p>
                    </div>
                    <div class="stats-summary" id="stats-summary" style="margin-top: 10px; color: var(--text-main);">
                        0 Sessions Logged- 0 Connections
                    </div>
                </div>

                <div class="panel streak-stats" style="flex: 1; min-width: 150px; text-align: center;">
                    <h3 style="margin-bottom: 5px; color: var(--text-muted); font-size: 11px; text-transform: uppercase;">🔥 Current Streak</h3>
                    <div id="streak-counter" style="font-size: 28px; font-weight: 700; color: var(--primary-accent); margin-top: 5px;">
                        0 Days
                    </div>
                </div>

            </div>
<!--WHEN A NODE IS CLICKED SHOWS SUMMARY DETAILS OF THAT SESSION-->
        <div id="session-module" class="module-overlay" style="display: none;">
            <div class="body-content">
                <div class="module-header">
                    <h3 id="module-title">Session Details</h3>
                    <button class="close-module-btn" onclick="closeSessionModule()">×</button>
                </div>
                <div class="module-body">
                    <p style="color: #686767; font-size: 13px;">DATE</p>
                    <p id="module-date"></p>
                    
                    <p style="color: #686767; font-size: 13px;"> KEY THEME</p>
                    <p style="font-size: 16px; margin-bottom: 15px;"><span class="theme-tabs" id="module-theme" style="display: inline-block;"></span></p>
                    
                    <p style="color: #686767; font-size: 13px;">AI OVERVIEW</p>
                    <p style="font-size: 14px; line-height: 1.5;"></p>
                    <p id="module-summary" style="font-size: 14px; line-height: 1.5;"></p>
                </div>
            </div>
        </div>

    </div> 
</body>
</html>
