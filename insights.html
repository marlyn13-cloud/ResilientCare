<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights Page - ResilientCare</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body onload="loadInsightsGraph()">
    
    <div class="app-single-column">
        
        <nav class="vent-nav">
            <div class="nav-left">
                <button class="icon-btn" onclick="window.location.href='index.html'">← Home</button>
            </div>
            <span class="nav-title">Insights</span>
            <div class="nav-right" style="min-width: 80px;"></div> </nav>

        <div class="insights-container">
            <div class="graph-area">
                <div id="graph-scroll-container">
                    <svg id="graph-lines" width="100%" height="100%"></svg>
                    <div id="graph-nodes"></div>
                </div>
            </div>

            <div class="insights-bottom-panels">
                <div class="panel key-themes">
                    <h3>KEY THEMES</h3>
                    <div class="theme-tags" id="theme-tags"></div>
                </div>
                
                <div class="panel sessions-stats">
                    <div class="stats-text">
                        <p style="margin:0; font-weight:600; color: #fff;">Sessions Completed</p>
                        <p style="margin: 5px 0 0 0; font-size: 11px; color: #9b9a9a;">Click a node to see session details</p>
                    </div>
                    <div class="stats-summary" id="stats-summary">
                        0 Sessions — 0 Connections
                    </div>
                </div>
            </div> 
        </div> 

        <div id="session-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">Session Details</h3>
                    <button class="close-modal-btn" onclick="closeSessionModal()">×</button>
                </div>
                <div class="modal-body">
                    <p style="color: #9b9a9a; font-size: 13px;">DATE</p>
                    <p id="modal-date"></p>
                    
                    <p style="color: #9b9a9a; font-size: 13px;"> KEY THEME</p>
                    <p style="font-size: 16px; margin-bottom: 15px;"><span class="theme-pill" id="modal-theme" style="display: inline-block;"></span></p>
                    
                    <p style="color: #9b9a9a; font-size: 13px;">AI OVERVIEW</p>
                    <p style="font-size: 14px; line-height: 1.5;"></p>
                    <p id="modal-summary" style="font-size: 14px; line-height: 1.5;"></p>
                </div>
            </div>
        </div>

    </div> 
</body>
</html>
