<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent Box - ResilientCare</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="vent-box-layout">
        <nav class="vent-nav">
            <button class="icon-btn" onclick="window.location.href='index.html'">← Back</button>
            <span class="nav-title">✨ Vent Box</span>
            <button class="icon-btn">💾</button>
        </nav>

        <main class="vent-main">
            <span class="hero-emoji">🌸</span>
            <p>I'm here to listen. This is a safe place.</p>
            
            <div class="input-area">
                <textarea id="vent-input" placeholder="Share what's on your mind..."></textarea>
                <button class="send-fab" onclick="handleSend()">➤</button>
            </div>
        </main>
    </div>
</body>
</html>
